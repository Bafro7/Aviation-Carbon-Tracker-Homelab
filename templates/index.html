<!DOCTYPE html>
<html>
<head>
    <title>Live Carbon Fleet Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 40px; }
        #map { height: 420px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #333; }
        .layout { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; font-size: 13px; }
        .co2-val { color: #ff4d4d; font-weight: bold; }
        .active-txt { color: #00ff95; font-weight: bold; }
    </style>
</head>
<body>
    <div style="margin-bottom:20px;">
        <small style="color:#888;">Tracking Since: <strong>April 23, 2026</strong></small>
        <h1 style="color:#00ff95; margin:0;">SkyWatch Live <span id="clock" style="font-size:14px; color:#666;"></span></h1>
    </div>
    <div id="map"></div>
    <div class="layout">
        <div class="card">
            <h2>Live Leaderboard</h2>
            <table>
                <thead><tr><th>Celebrity</th><th>Location</th><th>Miles</th><th>Carbon (lbs)</th><th>Status</th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
        <div class="card">
            <h3>Scale Comparison</h3>
            <div style="background:#2a2a2a; padding:15px; border-radius:8px; border-left:4px solid #00ff95;">
                <small>Average American</small><div style="font-size:19px; font-weight:bold;">32,000 lbs / year</div>
            </div>
            <p style="font-size: 11px; margin-top: 15px; color: #888;">* 1 Gallon Jet-A = 21.1 lbs CO2</p>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([30, -30], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        var markers = L.layerGroup().addTo(map);
        async function update() {
            const res = await fetch('/api/data'); const data = await res.json();
            document.getElementById('clock').innerText = "| Last Sync: " + new Date().toLocaleTimeString();
            markers.clearLayers(); let html = '';
            data.forEach(r => {
                if (r.CurrentLat) { 
                    L.marker([r.CurrentLat, r.CurrentLon]).addTo(markers)
                     .bindPopup(`<b>${r.CelebrityName}</b><br>${r.AircraftModel}`); 
                }
                html += `<tr>
                    <td><strong>${r.CelebrityName}</strong><br><small>${r.AircraftModel}</small></td>
                    <td>${r.LastLocation || 'Unknown'}</td>
                    <td>${Number(r.TotalMiles).toLocaleString()}</td>
                    <td class="co2-val">${Number(r.TotalCO2).toLocaleString()}</td>
                    <td class="${r.AircraftStatus=='Active/Flying' ? 'active-txt':'' }">${r.AircraftStatus}</td>
                </tr>`;
            });
            document.getElementById('tbody').innerHTML = html;
        }
        update(); setInterval(update, 60000);
    </script>
</body>
</html>
